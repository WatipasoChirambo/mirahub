services:
  db:
    image: postgres:15
    container_name: mirahub_db
    environment:
      POSTGRES_USER: mirahub
      POSTGRES_PASSWORD: mirahub123
      POSTGRES_DB: mirahub
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/migrations.sql:/docker-entrypoint-initdb.d/migrations.sql

